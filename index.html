<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Houghton 2026 — Planner</title>
<meta name="theme-color" content="#FFFFFF">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon.svg">
<style>
:root{
  --paper:#FFFFFF; --ink:#0A0A0A; --grey1:#F6F6F6; --grey2:#ECECEC; --grey3:#E0E0E0;
  --txt2:#6B6B6B; --faded:#9E9E9E;
  --green:#2E7D32; --red:#D32F2F;
  --hour:48px; --gutter:44px; --colw:132px;
  --rs:8px; --rm:14px; --rl:22px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
html,body{height:100%}
body{background:var(--paper);color:var(--ink);font-family:'Helvetica Neue',Helvetica,Arial,system-ui,sans-serif;overscroll-behavior-y:none}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
button{transition:background .15s,color .15s,border-color .15s,opacity .15s}
header{background:var(--paper);position:relative;z-index:20;padding-top:env(safe-area-inset-top);border-bottom:1px solid var(--grey2)}
.masthead{display:flex;align-items:center;gap:8px;padding:14px 16px 6px}
.masthead h1{font-weight:800;font-size:19px;letter-spacing:-.02em;text-transform:uppercase}
.masthead .sub{font-size:10px;letter-spacing:.24em;text-transform:uppercase;color:var(--txt2);margin-top:2px}
.masthead .share{border:1px solid var(--grey3);border-radius:999px;padding:6px 14px;font-size:12px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;background:var(--paper)}
.masthead .share:active{background:var(--ink);color:#fff;border-color:var(--ink)}
.masthead #searchBtn{margin-left:10px}
.people{display:flex;gap:8px;padding:8px 16px 10px;overflow-x:auto;scrollbar-width:none}
.people::-webkit-scrollbar{display:none}
.pchip{display:flex;align-items:center;gap:6px;border:1px solid var(--grey3);border-radius:999px;padding:7px 14px;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;white-space:nowrap;flex:0 0 auto;color:var(--pc,var(--ink));background:var(--paper)}
.pchip.on{background:var(--pc,var(--ink));border-color:var(--pc,var(--ink));color:var(--pt,#fff)}
.pchip.add{border:1px dashed var(--grey3);color:var(--txt2);font-weight:500}
.tabs{display:flex;align-items:center;gap:8px;padding:0 16px 12px;border-top:none}
.days{display:flex;flex:1;background:var(--grey1);border-radius:999px;padding:3px}
.dtab{flex:1;padding:7px 0;text-align:center;font-weight:700;font-size:12px;letter-spacing:.06em;text-transform:uppercase;border-radius:999px;color:var(--txt2);position:relative}
.dtab.on{background:var(--ink);color:#fff}
.dtab .cnt{display:inline-block;margin-left:5px;font-size:10px;opacity:.7;font-weight:500}
.vtab{padding:7px 14px;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;border-radius:999px;background:var(--grey1);color:var(--txt2)}
.vtab.on{background:var(--ink);color:#fff}
main{position:fixed;top:148px;left:0;right:0;bottom:0;overflow:hidden}
#gridWrap{height:100%;overflow:auto;scroll-snap-type:x proximity;scroll-padding-left:calc(var(--gutter) + 4px)}
#gridWrap .col{scroll-snap-align:start}
.grid{position:relative;width:max-content;min-width:100%}
.hdrRow{display:flex;position:sticky;top:0;z-index:10;background:var(--paper);border-bottom:1px solid var(--grey2)}
.corner{position:sticky;left:0;z-index:11;width:var(--gutter);flex:0 0 var(--gutter);background:var(--paper);border-right:1px solid var(--grey2)}
.shead{width:var(--colw);flex:0 0 var(--colw);padding:8px 4px;text-align:center;font-size:10.5px;font-weight:700;letter-spacing:.08em;color:var(--txt2);text-transform:uppercase;display:flex;align-items:center;justify-content:center;min-height:36px}
.shead.fill{flex:1 1 auto;min-width:0}
.bodyRow{display:flex}
.gutter{position:sticky;left:0;z-index:9;width:var(--gutter);flex:0 0 var(--gutter);background:var(--paper);border-right:1px solid var(--grey2)}
.gut{position:relative}
.hlabel{position:absolute;left:0;right:6px;text-align:right;font-size:10px;font-weight:500;transform:translateY(-50%);background:var(--paper);padding:1px 2px 1px 0;color:var(--faded)}
.col{width:var(--colw);flex:0 0 var(--colw);position:relative;border-right:1px solid var(--grey2);
  background:repeating-linear-gradient(to bottom,transparent 0,transparent calc(var(--hour) - 1px),var(--grey2) calc(var(--hour) - 1px),var(--grey2) var(--hour))}
.col:nth-child(odd){background-color:#FBFBFB}
.col.fill{flex:1 1 auto;min-width:0;background-color:transparent;border-right:none}
.act{position:absolute;left:3px;right:3px;border:none;border-radius:var(--rs);background:#EFEFEF;color:#3D3D3D;
  display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;
  padding:3px 5px;text-transform:uppercase;overflow:hidden;user-select:none;-webkit-user-select:none}
.act .nm{font-size:11.5px;line-height:1.12;font-weight:700;letter-spacing:.01em;display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:var(--cl,4);overflow:hidden}
.act .tm{font-size:9.5px;opacity:.7;margin-top:2px;font-weight:500}
.act.sm{padding:1px 3px}
.act.sm .nm{font-size:10px}
.act.sm .tm{display:none}
.act.g2{background:#E4E4E4}
.act.picked{background:#FFFFFF;color:var(--ink);border:1px solid var(--grey3);padding-bottom:11px}
.act.picked.sm{padding-bottom:8px}
.act .bar{position:absolute;left:0;right:0;bottom:0;height:7px;display:flex}
.act .bar span{flex:1}
.act.sm .bar{height:5px}
.act.note{background:transparent;border:1px dashed var(--grey3);color:var(--faded);pointer-events:none}
.act.flash{animation:aflash 1.8s ease-out}
@keyframes aflash{0%,70%{box-shadow:0 0 0 4px var(--ink)}100%{box-shadow:0 0 0 0 rgba(0,0,0,0)}}
#plan{height:100%;overflow-y:auto;padding:16px 16px 90px}
.dayTitle{font-weight:800;font-size:20px;margin:10px 0 10px;text-transform:uppercase;letter-spacing:-.01em}
.filterRow{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.fchip{border:1px solid var(--grey3);border-radius:999px;padding:6px 13px;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.03em;color:var(--txt2);background:var(--paper)}
.fchip.on{background:var(--ink);border-color:var(--ink);color:#fff}
.entry{display:flex;gap:12px;border:1px solid var(--grey2);border-radius:var(--rm);margin-bottom:8px;background:var(--paper);overflow:hidden}
.entry .when{flex:0 0 66px;background:var(--grey1);padding:10px 6px;text-align:center;display:flex;flex-direction:column;justify-content:center}
.entry .when .s{font-size:15px;font-weight:800}
.entry .when .e{font-size:10px;color:var(--txt2);margin-top:1px}
.entry .what{flex:1;padding:10px 12px 10px 0;min-width:0}
.entry .what .a{font-size:14.5px;font-weight:700;text-transform:uppercase;line-height:1.15}
.entry .what .st{font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--txt2);margin-top:2px}
.entry .who{display:flex;gap:5px;margin-top:7px;flex-wrap:wrap}
.wchip{display:flex;align-items:center;gap:5px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;border:1px solid var(--grey2);border-radius:999px;padding:2px 8px}
.pd{width:8px;height:8px;border-radius:50%;flex:0 0 auto;display:inline-block}
.entry.clash{border-color:var(--red)}
.tag{display:inline-block;font-size:9px;font-weight:700;letter-spacing:.1em;padding:2px 8px;margin-left:6px;vertical-align:2px;border-radius:999px}
.tag.cl{background:var(--red);color:#fff}
.tag.all{background:var(--green);color:#fff}
.empty{border:1px dashed var(--grey3);border-radius:var(--rm);color:var(--faded);padding:28px 16px;text-align:center;font-size:13px;text-transform:uppercase;letter-spacing:.06em;line-height:1.7}
#sheet{position:fixed;inset:0;z-index:50;display:none;align-items:flex-end;background:rgba(0,0,0,.45)}
#sheet.open{display:flex}
#sheet.center{align-items:center;justify-content:center;padding:20px}
.sheetIn{background:var(--paper);border-radius:var(--rl) var(--rl) 0 0;width:100%;max-width:560px;margin:0 auto;padding:10px 20px calc(20px + env(safe-area-inset-bottom));max-height:78dvh;overflow-y:auto}
.sheetIn::before{content:'';display:block;width:36px;height:4px;border-radius:2px;background:var(--grey3);margin:6px auto 14px}
.sheetIn.modal{border-radius:var(--rl);max-width:420px;padding:22px 20px 20px}
.sheetIn.modal.wide{max-width:560px}
.sheetIn.modal::before{display:none}
.sheetIn h2{font-weight:800;font-size:17px;margin-bottom:10px;text-transform:uppercase;letter-spacing:-.01em}
.srow{display:flex;gap:8px;margin-bottom:10px;align-items:center;flex-wrap:wrap}
.sbtn{border-radius:999px;padding:10px 18px;font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;background:var(--grey1);color:var(--ink)}
.sbtn.solid{background:var(--ink);color:#fff}
.sbtn.danger{background:none;border:1px solid var(--red);color:var(--red)}
.sin{border:none;background:var(--grey1);border-radius:12px;padding:12px 14px;font:inherit;font-size:16px;color:var(--ink);flex:1;min-width:120px;text-transform:uppercase}
.sin:focus{outline:2px solid var(--ink)}
.shint{font-size:12.5px;line-height:1.55;color:var(--txt2);margin:2px 0 14px}
#banner{position:fixed;left:12px;right:12px;bottom:calc(14px + env(safe-area-inset-bottom));z-index:60;display:none}
#banner.show{display:block}
.bIn{background:var(--ink);color:#fff;border-radius:var(--rm);padding:14px 16px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.bIn .msg{flex:1;font-size:13px;min-width:150px}
.bIn button{border:1px solid rgba(255,255,255,.5);border-radius:999px;padding:6px 14px;font-size:12px;font-weight:600;text-transform:uppercase}
.bIn button.pri{background:#fff;color:var(--ink);border-color:#fff}
.sr{display:flex;gap:10px;border:1px solid var(--grey2);border-radius:var(--rm);padding:10px 12px;margin-bottom:6px;align-items:center;cursor:pointer;background:var(--paper)}
.sr .d{flex:0 0 78px;font-size:11px;font-weight:700;text-transform:uppercase;line-height:1.35}
.sr .d small{display:block;font-weight:500;opacity:.65}
.sr .a{flex:1;min-width:0;font-size:14px;font-weight:700;text-transform:uppercase;line-height:1.2}
.sr .a small{display:block;font-size:10px;font-weight:500;letter-spacing:.06em;opacity:.65;margin-top:1px}
.sr .go{flex:0 0 auto;border:1px solid var(--grey3);border-radius:999px;padding:6px 12px;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;background:none;color:inherit}
.sr.picked{background:var(--pc,var(--ink));border-color:var(--pc,var(--ink));color:var(--pt,#fff)}
.sr.picked .go{border-color:currentColor;color:inherit}
.snores{font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--faded);padding:14px 2px}
.pbig{display:flex;align-items:center;gap:10px;width:100%;border:1px solid var(--grey3);border-radius:var(--rm);color:var(--pc);padding:14px;margin-bottom:8px;font-size:15px;font-weight:700;text-transform:uppercase;background:var(--paper)}
.pbig.going{background:var(--pc);border-color:var(--pc);color:var(--pt,#fff)}
.pbig .pd{width:10px;height:10px}
.pbig .st2{margin-left:auto;font-size:11px;font-weight:500;letter-spacing:.06em}
.pvday{font-weight:800;font-size:11px;letter-spacing:.12em;margin:14px 0 6px;text-transform:uppercase;color:var(--txt2)}
.pvrow{display:flex;gap:8px;align-items:baseline;font-size:13px;padding:8px 12px;border:1px solid var(--grey2);border-radius:12px;margin-bottom:5px;text-transform:uppercase}
.pvrow .t{font-weight:700;flex:0 0 92px;font-size:12px}
.pvrow .n{font-weight:700;min-width:0}
.pvrow .s{color:var(--txt2);margin-left:auto;font-size:9.5px;letter-spacing:.05em;text-align:right;flex:0 0 auto}
.swatches{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-top:8px}
.sw{aspect-ratio:1;width:100%;max-width:46px;justify-self:center;border:none;border-radius:50%;position:relative;cursor:pointer}
.sw.sel{outline:2.5px solid var(--ink);outline-offset:3px}
.sw.taken{opacity:.25;pointer-events:none}
.sw.taken span{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:700}
@media(min-width:700px){:root{--colw:150px}.masthead h1{font-size:22px}}
@media(max-width:480px){
  :root{--colw:112px;--gutter:38px;--hour:44px}
  .masthead{padding:10px 12px 4px}
  .masthead h1{font-size:16px}
  .masthead .sub{display:none}
  .masthead .share{font-size:11px;padding:5px 11px}
  .people{padding:6px 12px 8px}
  .pchip{font-size:12px;padding:6px 11px}
  .tabs{padding:0 12px 10px;gap:6px}
  .dtab{font-size:11px;padding:6px 0;letter-spacing:.04em}
  .vtab{padding:6px 10px;font-size:10px}
  .shead{font-size:9px;letter-spacing:.04em;padding:5px 2px;min-height:30px}
  .act .nm{font-size:10.5px}
  .dayTitle{font-size:18px}
}
</style>
</head>
<body>

  <div class="masthead">

  </div>
  <div class="people" id="peopleRow"></div>
  <div class="tabs">

</header>
<main id="main"></main>
<div id="banner"></div>
<div id="sheet"></div>

const COLORS = PALETTES.flat;
const ALLCOLORS = [...new Set(Object.values(PALETTES).flat())];
function lumc(hex){const v=[1,3,5].map(i=>parseInt(hex.slice(i,i+2),16)/255).map(c=>c<=0.03928?c/12.92:Math.pow((c+0.055)/1.055,2.4));return .2126*v[0]+.7152*v[1]+.0722*v[2];}
function textOn(hex){const L=lumc(hex);return (1.05/(L+.05))>=((L+.05)/.05)?'#FFFFFF':'#0A0A0A';}
function isLight(hex){ return textOn(hex)==='#0A0A0A'; }
function takenColors(exceptId){ return S.people.filter(p=>p.id!==exceptId).map(p=>p.color); }
function freeColor(){ const t=takenColors(); return ALLCOLORS.find(c=>!t.includes(c))||ALLCOLORS[S.people.length%ALLCOLORS.length]; }
const HOUR = 48, DAY_MIN = 23*60;

// act id = day~stage~start
function aid(day,a){ return day+'~'+STAGE_ORDER.indexOf(a.stage)+'~'+a.start; }
function fmt(m){ const h=(9+Math.floor(m/60))%24; return String(h).padStart(2,'0')+':'+String(m%60).padStart(2,'0'); }
const ACTS = {};   // id -> {day, stage, artist, start, end}
DAYS.forEach(d => DATA[d].forEach(a => { ACTS[aid(d,a)] = {day:d, ...a}; }));

// ---------- state ----------
const KEY='htn26-v1';
let S;
try { S = JSON.parse(localStorage.getItem(KEY)) || null; } catch(e){ S = null; }
if (!S || !S.people) {
  S = { people:[], picks:{}, active:null, day:'thu', view:'grid', planDay:'all' };
}
if(!S.planDay) S.planDay='all';
if(S.active && !S.people.find(p=>p.id===S.active)) S.active=null;
if(!S.active && S.people.length) S.active=S.people[0].id;
S.people.forEach(p=>{
  if(!ALLCOLORS.includes(p.color)){
    const t=S.people.filter(x=>x!==p).map(x=>x.color);
    p.color=ALLCOLORS.find(c=>!t.includes(c))||ALLCOLORS[0];
  }
});
function save(skipPush){ try{ localStorage.setItem(KEY, JSON.stringify(S)); }catch(e){} if(!skipPush) partyQueue(); }
function person(id){ return S.people.find(p=>p.id===id); }
function picksOf(id){ return (S.picks[id]||[]).filter(x=>ACTS[x]); }

function renderTabs(){

  document.getElementById('vPlan').className='vtab'+(S.view==='plan'?' on':'');
}
document.getElementById('vGrid').onclick=()=>{S.view='grid';save();renderAll();};
document.getElementById('vPlan').onclick=()=>{S.view='plan';save();renderAll();};

// ---------- grid ----------
function renderGrid(){
  const prev=document.getElementById('gridWrap');
  const keep=prev?{t:prev.scrollTop,l:prev.scrollLeft,d:prev.dataset.day}:null;
  const day=S.day;
  const acts=DATA[day];
  const stages=STAGE_ORDER.filter(s=>acts.some(a=>a.stage===s) || (s==='TERMINUS'&&TERMINUS_DAYS.includes(day)));
  const wrap=document.createElement('div'); wrap.id='gridWrap'; wrap.dataset.day=day;
  const g=document.createElement('div'); g.className='grid';
  // header
  const hr=document.createElement('div'); hr.className='hdrRow';
  hr.innerHTML='<div class="corner"></div>'+stages.map(s=>`<div class="shead">${esc(titleStage(s))}</div>`).join('')+'<div class="shead fill"></div>';
  g.appendChild(hr);
  // body
  const br=document.createElement('div'); br.className='bodyRow';
  const gut=document.createElement('div'); gut.className='gutter gut';
  gut.style.height=(DAY_MIN/60*HOUR)+'px';
  for(let h=0;h<=23;h++){
    const lab=document.createElement('div'); lab.className='hlabel';
    lab.style.top=(h*HOUR)+'px'; lab.textContent=fmt(h*60);
    gut.appendChild(lab);
  }
  br.appendChild(gut);
  stages.forEach(s=>{
    const col=document.createElement('div'); col.className='col';
    col.style.height=(DAY_MIN/60*HOUR)+'px';
    if(s==='TERMINUS'){
      const n=document.createElement('div'); n.className='act note';
      n.style.top='6px'; n.style.height=(DAY_MIN/60*HOUR-12)+'px';
      n.innerHTML='<div class="nm">Open 24 hours<br><br>Secret line-up —<br>artists not announced</div>';
      col.appendChild(n);
    }
    acts.filter(a=>a.stage===s).forEach((a,ai)=>{
      const id=aid(day,a);
      const el=document.createElement('button');
      const durPx=(a.end-a.start)/60*HOUR;
      const who=S.people.filter(p=>picksOf(p.id).includes(id));
      el.className='act'+(durPx<34?' sm':'')+(ai%2?' g2':'')+(who.length?' picked':'');
      el.dataset.aid=id;
      el.style.top=(a.start/60*HOUR)+'px';
      el.style.height=Math.max(durPx-2,16)+'px';
      const showTm=durPx>=56;
      const lines=Math.max(1,Math.floor((durPx-(showTm?26:14))/13));
      el.style.setProperty('--cl',lines);
      el.title=`${a.artist} — ${fmt(a.start)}–${fmt(a.end)} — ${titleStage(a.stage)}`;
      el.innerHTML=`<div class="nm">${esc(a.artist)}</div>`+(showTm?`<div class="tm">${fmt(a.start)}–${fmt(a.end)}</div>`:'');
      if(who.length){
        el.innerHTML+=`<div class="bar">${who.map(p=>`<span style="background:${p.color}"></span>`).join('')}</div>`;
      }
      el.onclick=()=>openActSheet(id);
      col.appendChild(el);
    });
    br.appendChild(col);
  });
  const filler=document.createElement('div');
  filler.className='col fill';
  filler.style.height=(DAY_MIN/60*HOUR)+'px';
  br.appendChild(filler);
  g.appendChild(br);
  wrap.appendChild(g);
  const main=document.getElementById('main');
  main.innerHTML=''; main.appendChild(wrap);
  if(keep&&keep.d===day){
    wrap.scrollTop=keep.t; wrap.scrollLeft=keep.l;
  }else{
    const first=Math.min(...acts.map(a=>a.start));
    wrap.scrollTop=Math.max(0,(isFinite(first)?first:0)/60*HOUR-20);
  }
}
function titleStage(s){ return s.replace('DERREN SMART STAGE','DERREN SMART'); }
function togglePick(id){
  if(!S.active){ openPersonSheet(null); return; }
  if(!canEdit(S.active)){ openClaimSheet(S.active); return; }
  const arr=S.picks[S.active]||(S.picks[S.active]=[]);
  const i=arr.indexOf(id);
  if(i>=0) arr.splice(i,1); else arr.push(id);
  save(); renderAll();
}
function openActSheet(id){
  const a=ACTS[id];
  const sheet=document.getElementById('sheet');
  sheet.className='open';
  let body;
  if(!S.people.length){
    body=`<div class="shint">Add a person first, then tap sets to mark who's going.</div>
      <div class="srow"><button class="sbtn solid" id="asAdd">Add a person</button></div>`;
  }else{
    body=S.people.map(p=>{
      const going=picksOf(p.id).includes(id);
      const tp=textOn(p.color);
      return `<button class="pbig${going?' going':''}" data-p="${p.id}" style="--pc:${p.color};--pt:${tp}">
        <span class="pd" style="background:${going?tp:p.color}"></span>${esc(p.name)}
        <span class="st2">${going?'Going ✓':'Not going'}</span></button>`;
    }).join('');
  }
  sheet.innerHTML=`<div class="sheetIn">
    <h2>${esc(a.artist)}</h2>
    <div class="shint">${DAYNAMES[a.day]} · ${fmt(a.start)}–${fmt(a.end)} · ${esc(titleStage(a.stage))}</div>
    ${body}
    <div class="srow" style="margin-top:8px"><button class="sbtn" id="asClose">Done</button></div>
  </div>`;
  sheet.onclick=e=>{ if(e.target===sheet) closeSheet(); };
  document.getElementById('asClose').onclick=closeSheet;
  const addB=document.getElementById('asAdd');
  if(addB) addB.onclick=()=>openPersonSheet(null);
  sheet.querySelectorAll('.pbig').forEach(b=>{
    b.onclick=()=>{
      const pid=b.dataset.p;
      if(!canEdit(pid)){ openClaimSheet(pid,()=>openActSheet(id)); return; }
      const arr=S.picks[pid]||(S.picks[pid]=[]);
      const i=arr.indexOf(id);
      if(i>=0) arr.splice(i,1); else arr.push(id);
      save(); renderAll(); openActSheet(id);
    };
  });
}

// ---------- plan ----------
let planFilter='all';
function renderPlan(){
  const main=document.getElementById('main');
  const el=document.createElement('div'); el.id='plan';
  // person filter
  const fr=document.createElement('div'); fr.className='filterRow';
  const mk=(key,label,color)=>{
    const b=document.createElement('button');
    b.className='fchip'+(planFilter===key?' on':'');
    b.innerHTML=(color?`<span class="pd" style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${color};margin-right:5px"></span>`:'')+esc(label);
    b.onclick=()=>{planFilter=key;renderAll();};
    fr.appendChild(b);
  };
  mk('all','Everyone');
  S.people.forEach(p=>mk(p.id,p.name,p.color));
  el.appendChild(fr);
  // day filter
  const dr=document.createElement('div'); dr.className='filterRow';
  const mkd=(key,label)=>{
    const b=document.createElement('button');
    b.className='fchip'+(S.planDay===key?' on':'');
    b.textContent=label;
    b.onclick=()=>{ S.planDay=key; if(key!=='all') S.day=key; save(); renderAll(); };
    dr.appendChild(b);
  };
  mkd('all','All days');
  DAYS.forEach(d=>mkd(d,DAYNAMES[d].slice(0,3)));
  el.appendChild(dr);

  const showDays = S.planDay==='all' ? DAYS : [S.planDay];
  const inFilter = planFilter==='all' ? S.people.map(p=>p.id) : [planFilter];
  let any=false;
  showDays.forEach(day=>{
    const ids=new Set();
    inFilter.forEach(pid=>picksOf(pid).forEach(x=>{ if(ACTS[x].day===day) ids.add(x); }));
    const list=[...ids].map(x=>ACTS[x]).sort((a,b)=>a.start-b.start||a.end-b.end);
    if(!list.length) return;
    any=true;
    const h=document.createElement('div'); h.className='dayTitle'; h.textContent=DAYNAMES[day];
    el.appendChild(h);
    // per-person clashes for this day
    const clashes=new Set();
    S.people.forEach(p=>{
      const mine=picksOf(p.id).filter(x=>ACTS[x].day===day).map(x=>ACTS[x]);
      for(let i=0;i<mine.length;i++)for(let j=i+1;j<mine.length;j++){
        const a=mine[i],b=mine[j];
        if(a.start<b.end&&b.start<a.end){ clashes.add(aid(day,a)); clashes.add(aid(day,b)); }
      }
    });
    list.forEach(a=>{
      const id=aid(day,a);
      const who=S.people.filter(p=>picksOf(p.id).includes(id));
      const everyone=S.people.length>1&&who.length===S.people.length;
      const clash=clashes.has(id)&&(planFilter==='all'||who.some(p=>p.id===planFilter));
      const e=document.createElement('div');
      e.className='entry'+(clash?' clash':'');
      e.innerHTML=`
        <div class="when"><div class="s">${fmt(a.start)}</div><div class="e">till ${fmt(a.end)}</div></div>
        <div class="what">
          <div class="a">${esc(a.artist)}${clash?'<span class="tag cl">clash</span>':''}${everyone?'<span class="tag all">everyone</span>':''}</div>

// ---------- join / edit person (floating card) ----------
function openPersonSheet(p,onDone){
  const sheet=document.getElementById('sheet');
  sheet.className='open center'; sheet.innerHTML='';
  const taken=takenColors(p&&p.id);
  const partyLocked=!!(FIREBASE_CONFIG&&S.room&&S.roomLib);
  let lib=partyLocked?S.roomLib:(p?(Object.keys(PALETTES).find(k=>PALETTES[k].includes(p.color))||'flat'):'flat');
  let sel=(p&&PALETTES[lib].includes(p.color))?p.color:(PALETTES[lib].find(c=>!taken.includes(c))||PALETTES[lib][0]);

  const inWrap=document.createElement('div'); inWrap.className='sheetIn modal';
  inWrap.innerHTML=`<h2>${p?'Edit '+esc(p.name):'Join the party'}</h2>`
    +(p?'':'<div class="shint">Pick a name and a colour — that colour is you, everywhere on the timetable.</div>');
  const row=document.createElement('div'); row.className='srow';
  const input=document.createElement('input');
  input.className='sin'; input.placeholder='Your name'; input.maxLength=14;
  if(p) input.value=p.name;
  row.appendChild(input);
  inWrap.appendChild(row);

  const libRow=document.createElement('div'); libRow.className='filterRow';
  const swBox=document.createElement('div'); swBox.className='swatches';
  function paintLibs(){
    libRow.innerHTML='';
    if(partyLocked){
      libRow.innerHTML=`<span class="shint" style="margin:0">Party palette: <b>${LIBNAMES[lib]}</b></span>`;
      return;
    }
    Object.keys(PALETTES).forEach(k=>{
      const b=document.createElement('button');
      b.className='fchip'+(k===lib?' on':'');
      b.textContent=LIBNAMES[k];
      b.onclick=()=>{
        lib=k;
        if(!PALETTES[lib].includes(sel)) sel=PALETTES[lib].find(c=>!taken.includes(c))||sel;
        paintLibs(); paintSwatches();
      };
      libRow.appendChild(b);
    });
  }
  function paintSwatches(){
    swBox.innerHTML='';
    PALETTES[lib].forEach(c=>{
      const isTaken=taken.includes(c);
      const b=document.createElement('button');
      b.className='sw'+(c===sel?' sel':'')+(isTaken?' taken':'');
      b.style.background=c;
      b.setAttribute('aria-label','colour '+c+(isTaken?' (taken)':''));
      if(isTaken) b.innerHTML=`<span style="color:${textOn(c)}">✕</span>`;
      else b.onclick=()=>{ sel=c; paintSwatches(); };
      swBox.appendChild(b);
    });
  }
  paintLibs(); paintSwatches();
  inWrap.appendChild(libRow);
  inWrap.appendChild(swBox);

  const r2=document.createElement('div'); r2.className='srow'; r2.style.marginTop='14px';
  const ok=document.createElement('button'); ok.className='sbtn solid'; ok.textContent=p?'Save':'Join';
  ok.onclick=()=>{
    const nm=input.value.trim().toUpperCase();
    if(!nm){ input.focus(); return; }
    if(p){ p.name=nm; p.color=sel; save(); closeSheet(); renderAll(); if(onDone) onDone(); }
    else{
      const id='p'+Date.now();
      S.people.push({id,name:nm,color:sel});
      S.picks[id]=[]; S.active=id;
      if(FIREBASE_CONFIG&&S.room){ claimed.add(id); S.claims=[...claimed]; }
      save(); closeSheet(); renderAll();
      if(onDone){ onDone(); }
      else if(FIREBASE_CONFIG&&S.room) openClaimSheet(id);
    }
  };
  r2.appendChild(ok);
  const cancel=document.createElement('button'); cancel.className='sbtn'; cancel.textContent='Cancel';
  cancel.onclick=closeSheet;
  r2.appendChild(cancel);
  if(p){
    const del=document.createElement('button'); del.className='sbtn danger';
    del.textContent='Remove';
    del.onclick=()=>{
      partyRemovePerson(p.id);
      claimed.delete(p.id); S.claims=[...claimed];
      S.people=S.people.filter(x=>x.id!==p.id); delete S.picks[p.id];
      if(S.active===p.id) S.active=S.people.length?S.people[0].id:null;
      save(); closeSheet(); renderAll();
    };
    r2.appendChild(del);
  }
  inWrap.appendChild(r2);
  sheet.appendChild(inWrap);
  sheet.onclick=e=>{ if(e.target===sheet) closeSheet(); };
  input.focus();
}

let FB=null, myUid=null, roomUnsub=null, applyingRemote=false, pushTimer=null;
const claimed=new Set();
async function sha(s){const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode('htn26:'+s));return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('');}
function inParty(){ return !!(FIREBASE_CONFIG && S.room && FB); }
function isOrganizer(){ return inParty() && S.roomOrg===myUid; }
function canEdit(pid){ if(!(FIREBASE_CONFIG&&S.room)) return true; return claimed.has(pid)||isOrganizer(); }
async function initParty(){
  if(!FIREBASE_CONFIG) return;
  try{
    const V='10.12.2';
    const [appM,authM,dbM]=await Promise.all([
      import('https://www.gstatic.com/firebasejs/'+V+'/firebase-app.js'),
      import('https://www.gstatic.com/firebasejs/'+V+'/firebase-auth.js'),
      import('https://www.gstatic.com/firebasejs/'+V+'/firebase-database.js')]);
    const app=appM.initializeApp(FIREBASE_CONFIG);
    const auth=authM.getAuth(app);
    await authM.signInAnonymously(auth);
    myUid=auth.currentUser.uid;
    FB={db:dbM.getDatabase(app),m:dbM};
    (S.claims||[]).forEach(pid=>claimed.add(pid));
    if(S.room) subscribeRoom(S.room);
  }catch(e){ console.warn('party init failed',e); }
}
function subscribeRoom(id){
  if(!FB) return;
  if(roomUnsub) roomUnsub();
  roomUnsub=FB.m.onValue(FB.m.ref(FB.db,'rooms/'+id),snap=>{
    const v=snap.val();
    if(!v){ leaveParty(); return; }
    applyingRemote=true;
    S.room=id; S.roomName=v.name||'Party'; S.roomOrg=v.org; S.roomLib=PALETTES[v.lib]?v.lib:'flat';
    const ppl=v.people||{};
    S.people=Object.keys(ppl).sort((a,b)=>(ppl[a].ts||0)-(ppl[b].ts||0))
      .map(k=>({id:k,name:ppl[k].name,color:ppl[k].color,pin:ppl[k].pin||null}));
    S.picks={};
    const pk=v.picks||{};
    Object.keys(pk).forEach(k=>{ S.picks[k]=Object.values(pk[k]||{}).filter(x=>ACTS[x]); });
    if(S.active&&!S.people.find(p=>p.id===S.active)) S.active=S.people.length?S.people[0].id:null;
    save(true); renderAll();
    applyingRemote=false;
  });
}
function partyQueue(){
  if(!inParty()||applyingRemote) return;
  clearTimeout(pushTimer);
  pushTimer=setTimeout(()=>{
    const pids=isOrganizer()?S.people.map(p=>p.id):S.people.filter(p=>claimed.has(p.id)).map(p=>p.id);
    pids.forEach(pid=>{
      const p=S.people.find(x=>x.id===pid);
      if(!p) return;
      FB.m.update(FB.m.ref(FB.db,'rooms/'+S.room+'/people/'+pid),{name:p.name,color:p.color,pin:p.pin||null});
      FB.m.set(FB.m.ref(FB.db,'rooms/'+S.room+'/picks/'+pid),picksOf(pid));
    });
  },400);
}
function partyRemovePerson(pid){
  if(!inParty()) return;
  FB.m.remove(FB.m.ref(FB.db,'rooms/'+S.room+'/people/'+pid));
  FB.m.remove(FB.m.ref(FB.db,'rooms/'+S.room+'/picks/'+pid));
}
async function createParty(name,lib){
  const AB='ABCDEFGHJKMNPQRSTUVWXYZ23456789';
  const id=Array.from(crypto.getRandomValues(new Uint8Array(6))).map(b=>AB[b%AB.length]).join('');
  lib=PALETTES[lib]?lib:'flat';
  const pal=PALETTES[lib];
  const people={},picks={};
  S.people.forEach((p,i)=>{
    if(!pal.includes(p.color)) p.color=pal.find(c=>!S.people.some(x=>x!==p&&x.color===c))||pal[i%pal.length];
    people[p.id]={name:p.name,color:p.color,pin:p.pin||null,ts:i};
    picks[p.id]=picksOf(p.id); claimed.add(p.id);
  });
  S.claims=[...claimed];
  await FB.m.set(FB.m.ref(FB.db,'rooms/'+id),{name:name||'Houghton party',org:myUid,lib,created:{'.sv':'timestamp'},people,picks});
  S.room=id; S.roomLib=lib; save(true); subscribeRoom(id);
}

  if(roomUnsub){ roomUnsub(); roomUnsub=null; }
  S.room=null; S.roomOrg=null; S.roomName=null; S.roomLib=null;

}

function b64d(s){ return decodeURIComponent(escape(atob(s.replace(/-/g,'+').replace(/_/g,'/')))); }

async function copy(text,btn){
  try{ await navigator.clipboard.writeText(text); }
  catch(e){
    const ta=document.createElement('textarea'); ta.value=text; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy'); ta.remove();
  }
  const old=btn.textContent; btn.textContent='Copied ✓';
  setTimeout(()=>{ btn.textContent=old; },1500);
}

    <div class="srow"><input class="sin" id="sq" placeholder="Artist, stage or day" autocomplete="off"></div>
    <div id="sres"></div>
    <div class="srow" style="margin-top:8px"><button class="sbtn" id="sqClose">Close</button></div>
  </div>`;
  sheet.onclick=e=>{ if(e.target===sheet) closeSheet(); };
  document.getElementById('sqClose').onclick=closeSheet;
  const input=document.getElementById('sq');
  input.oninput=()=>renderResults(input.value);
  input.focus();
}
function renderResults(q){
  const box=document.getElementById('sres');
  if(!box) return;
  q=(q||'').trim().toLowerCase();
  box.innerHTML='';
  if(q.length<2){ return; }
  const hits=Object.entries(ACTS).filter(([id,a])=>
      a.artist.toLowerCase().includes(q)||a.stage.toLowerCase().includes(q)||DAYNAMES[a.day].toLowerCase().includes(q))
    .sort((x,y)=>DAYS.indexOf(x[1].day)-DAYS.indexOf(y[1].day)||x[1].start-y[1].start)
    .slice(0,60);
  if(!hits.length){ box.innerHTML='<div class="snores">Nothing matches. Try part of a name.</div>'; return; }
  hits.forEach(([id,a])=>{
    const row=document.createElement('div');
    const picked=picksOf(S.active).includes(id);
    row.className='sr'+(picked?' picked':'');
    const ap=person(S.active);
    if(picked&&ap){ row.style.setProperty('--pc',ap.color); row.style.setProperty('--pt',textOn(ap.color)); }
    row.innerHTML=`
      <div class="d">${DAYNAMES[a.day].slice(0,3)}<small>${fmt(a.start)}–${fmt(a.end)}</small></div>
      <div class="a">${esc(a.artist)}<small>${esc(titleStage(a.stage))}</small></div>
      <button class="go">Go</button>`;
    row.onclick=()=>{ togglePick(id); renderResults(q); };
    row.querySelector('.go').onclick=e=>{ e.stopPropagation(); jumpTo(id); };
    box.appendChild(row);
  });
}
function jumpTo(id){
  closeSheet();
  const a=ACTS[id];
  S.day=a.day; S.view='grid'; save(); renderAll();
  requestAnimationFrame(()=>{
    const wrap=document.getElementById('gridWrap');
    const el=wrap&&wrap.querySelector(`[data-aid="${CSS.escape(id)}"]`);
    if(!el) return;
    wrap.scrollTop=Math.max(0,el.offsetTop-90);
    wrap.scrollLeft=Math.max(0,el.parentElement.offsetLeft-60);
    el.classList.add('flash');
    setTimeout(()=>el.classList.remove('flash'),1900);
  });
}

// import from hash
function checkImport(){
  const rm=location.hash.match(/#r=([A-Za-z0-9_\-]+)/);
  if(rm){
    history.replaceState(null,'',location.pathname+location.search);
    const banner=document.getElementById('banner');
    if(!FIREBASE_CONFIG){
      banner.className='show';
      banner.innerHTML=`<div class="bIn"><span class="msg">This is a live party link, but this version isn't connected. Ask for an offline share link instead.</span><button class="pri" id="impNo">OK</button></div>`;
      document.getElementById('impNo').onclick=()=>{ banner.className=''; banner.innerHTML=''; };
      return;
    }
    banner.className='show';
    banner.innerHTML=`<div class="bIn"><span class="msg">Join this party? Your view switches to the group's live plan.</span>
      <button class="pri" id="prYes">Join</button><button id="prNo">Not now</button></div>`;
    document.getElementById('prYes').onclick=()=>{
      banner.className=''; banner.innerHTML='';
      S.room=rm[1]; save(true);
      if(FB) subscribeRoom(S.room);
    };
    document.getElementById('prNo').onclick=()=>{ banner.className=''; banner.innerHTML=''; };
    return;
  }
  const m=location.hash.match(/#i=([A-Za-z0-9_\-]+)/);
  if(!m) return;
  let payload=null;
  try{ payload=JSON.parse(b64d(m[1])); }catch(e){}
  history.replaceState(null,'',location.pathname+location.search);
  if(!payload||!payload.people||!payload.people.length) return;
  const banner=document.getElementById('banner');
  const names=payload.people.map(p=>p.n).join(', ');
  const total=payload.people.reduce((s,p)=>s+(p.p||[]).length,0);
  banner.className='show';
  banner.innerHTML=`<div class="bIn">
    <span class="msg">Import picks from ${esc(names)} (${total} sets)?</span>
    <button class="pri" id="impYes">Import</button><button id="impNo">Ignore</button>
  </div>`;
  document.getElementById('impYes').onclick=()=>{
    payload.people.forEach(inc=>{
      const nm=String(inc.n||'FRIEND').toUpperCase().slice(0,14);
      const valid=(inc.p||[]).filter(x=>ACTS[x]);
      let ex=S.people.find(p=>p.name===nm);
      if(!ex){
        ex={id:'p'+Date.now()+Math.floor(Math.random()*999),name:nm,color:freeColor()};
        S.people.push(ex);
      }
      S.picks[ex.id]=valid;
    });
    save(); banner.className=''; banner.innerHTML=''; renderAll();
  };
  document.getElementById('impNo').onclick=()=>{ banner.className=''; banner.innerHTML=''; };
}

// ---------- misc ----------
function esc(s){ return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function renderAll(){
  renderPeople(); renderTabs();
  document.documentElement.style.setProperty('--headh',document.getElementById('hdr').offsetHeight+'px');
  document.getElementById('main').style.top=document.getElementById('hdr').offsetHeight+'px';
  if(S.view==='grid') renderGrid(); else renderPlan();
}
window.addEventListener('resize',()=>{ document.getElementById('main').style.top=document.getElementById('hdr').offsetHeight+'px'; });
renderAll();
checkImport();
initParty();
if(!S.people.length && !S.room && !document.getElementById('banner').classList.contains('show')) openWelcome();
if('serviceWorker' in navigator && location.protocol.startsWith('http')){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
