<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Houghton 2026 — Planner</title>
<meta name="theme-color" content="#FFFFFF">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon.svg">
<style>
:root{
  --paper:#FFFFFF; --ink:#0A0A0A; --faded:#9E9E9E; --paper2:#F5F5F5;
  --green:#2E7D32; --red:#D32F2F; --hour:48px; --gutter:44px; --colw:132px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
html,body{height:100%}
body{
  background:var(--paper); color:var(--ink);
  font-family:'Helvetica Neue',Helvetica,Arial,system-ui,sans-serif;
  overscroll-behavior-y:none;
}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
header{border-bottom:2px solid var(--ink);background:var(--paper);position:relative;z-index:20;padding-top:env(safe-area-inset-top)}
.masthead{display:flex;align-items:baseline;gap:8px;padding:10px 12px 4px}
.masthead h1{font-weight:800;font-size:20px;letter-spacing:-.01em;text-transform:uppercase}
.masthead .sub{font-size:12px;letter-spacing:.28em;text-transform:uppercase;opacity:.85}
.masthead .share{border:1.5px solid var(--ink);padding:3px 10px;font-size:12px;letter-spacing:.12em;text-transform:uppercase}
.masthead .share:active{background:var(--ink);color:var(--paper)}
.masthead #searchBtn{margin-left:auto}
.people{display:flex;gap:6px;padding:6px 12px 8px;overflow-x:auto;scrollbar-width:none}
.people::-webkit-scrollbar{display:none}
.pchip{display:flex;align-items:center;gap:6px;border:2px solid var(--pc,var(--ink));color:var(--pc,var(--ink));
  padding:4px 10px;font-size:13px;font-weight:700;
  text-transform:uppercase;letter-spacing:.08em;white-space:nowrap;flex:0 0 auto;background:var(--paper)}
.pchip.on{background:var(--pc,var(--ink));color:#fff}
.pchip.add{border:1.5px dashed #9E9E9E;color:#616161;font-weight:400}
.tabs{display:flex;align-items:stretch;border-top:1.5px solid var(--ink)}
.days{display:flex;flex:1}
.dtab{flex:1;padding:8px 0 7px;text-align:center;font-weight:700;text-transform:uppercase;letter-spacing:.1em;
  font-size:13px;border-right:1.5px solid var(--ink);position:relative}
.dtab.on{background:var(--ink);color:var(--paper)}
.dtab .cnt{display:inline-block;margin-left:7px;font-size:10px;vertical-align:1px;opacity:.75;font-weight:400}
.vtab{width:64px;padding:8px 0 7px;text-align:center;font-size:11px;letter-spacing:.14em;text-transform:uppercase;border-right:1.5px solid var(--ink)}
.vtab:last-child{border-right:none}
.vtab.on{background:var(--ink);color:var(--paper)}
main{position:fixed;top:148px;left:0;right:0;bottom:0;overflow:hidden}
/* ---------- GRID ---------- */
#gridWrap{height:100%;overflow:auto;scroll-snap-type:x proximity;scroll-padding-left:calc(var(--gutter) + 4px)}
#gridWrap .col{scroll-snap-align:start}
.grid{position:relative;width:max-content;min-width:100%}
.hdrRow{display:flex;position:sticky;top:0;z-index:10;background:var(--paper);border-bottom:1.5px solid var(--ink)}
.corner{position:sticky;left:0;z-index:11;width:var(--gutter);flex:0 0 var(--gutter);background:var(--paper);border-right:1.5px solid var(--ink)}
.shead{width:var(--colw);flex:0 0 var(--colw);padding:7px 4px;text-align:center;font-size:11.5px;letter-spacing:.1em;
  border-right:1px solid var(--ink);text-transform:uppercase;display:flex;align-items:center;justify-content:center;min-height:38px}
.bodyRow{display:flex}
.gutter{position:sticky;left:0;z-index:9;width:var(--gutter);flex:0 0 var(--gutter);background:var(--paper);border-right:1.5px solid var(--ink);position:sticky}
.gut{position:relative}
.hlabel{position:absolute;left:0;right:4px;text-align:right;font-size:10px;letter-spacing:.05em;transform:translateY(-50%);background:var(--paper);padding:1px 2px 1px 0;color:#757575}
.col{width:var(--colw);flex:0 0 var(--colw);position:relative;border-right:1px solid rgba(0,0,0,.2);
  background:repeating-linear-gradient(to bottom,transparent 0,transparent calc(var(--hour) - 1px),rgba(0,0,0,.08) calc(var(--hour) - 1px),rgba(0,0,0,.08) var(--hour))}
.col:nth-child(odd){background-color:#FAFAFA}
.col.fill{flex:1 1 auto;min-width:0;background-color:transparent;border-right:none}
.shead.fill{flex:1 1 auto;min-width:0;border-right:none}
.act{position:absolute;left:3px;right:3px;border:1px solid #BDBDBD;background:#EEEEEE;color:#424242;
  display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;
  padding:2px 3px 8px;text-transform:uppercase;overflow:hidden;user-select:none;-webkit-user-select:none}
.act .nm{font-size:12px;line-height:1.1;font-weight:600;letter-spacing:.02em;
  display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:var(--cl,4);overflow:hidden}
.act .tm{font-size:9.5px;opacity:.75;margin-top:1px}
.act.g2{background:#DEDEDE;border-color:#ABABAB}
.act.picked{color:#fff;border-color:var(--ink);z-index:1;text-shadow:0 1px 2px rgba(0,0,0,.35)}
.act.picked .tm{opacity:.95}
.act.flash{animation:aflash 1.8s ease-out}
.pbig{display:flex;align-items:center;gap:10px;width:100%;border:2px solid var(--pc);color:var(--pc);
  padding:12px;margin-bottom:8px;font-size:15px;font-weight:700;text-transform:uppercase;background:var(--paper)}
.pbig.going{background:var(--pc);color:#fff}
.pbig .pd{width:10px;height:10px;border-radius:50%;flex:0 0 auto}
.pbig .st2{margin-left:auto;font-size:11px;font-weight:400;letter-spacing:.1em}
.pvday{font-weight:800;font-size:12px;letter-spacing:.12em;margin:12px 0 6px;text-transform:uppercase}
.pvrow{display:flex;gap:8px;align-items:baseline;font-size:13px;padding:6px 8px;border:1px solid #BDBDBD;margin-bottom:4px;text-transform:uppercase}
.pvrow .t{font-weight:700;flex:0 0 92px;font-size:12px}
.pvrow .n{font-weight:600;min-width:0}
.pvrow .s{opacity:.6;margin-left:auto;font-size:10px;letter-spacing:.06em;text-align:right;flex:0 0 auto}
@keyframes aflash{0%{box-shadow:0 0 0 5px #2196F3}70%{box-shadow:0 0 0 5px #2196F3}100%{box-shadow:0 0 0 0 rgba(33,150,243,0)}}
.sr{display:flex;gap:10px;border:1px solid #BDBDBD;padding:8px 10px;margin-bottom:6px;align-items:center;cursor:pointer;background:var(--paper)}
.sr .d{flex:0 0 78px;font-size:11px;font-weight:700;text-transform:uppercase;line-height:1.3}
.sr .d small{display:block;font-weight:400;opacity:.7}
.sr .a{flex:1;min-width:0;font-size:14px;font-weight:600;text-transform:uppercase;line-height:1.15}
.sr .a small{display:block;font-size:10.5px;font-weight:400;letter-spacing:.08em;opacity:.7;margin-top:1px}
.sr .go{flex:0 0 auto;border:1.5px solid currentColor;padding:4px 9px;font-size:11px;letter-spacing:.1em;text-transform:uppercase;background:none;color:inherit}
.sr.picked{background:var(--pc,var(--ink));color:#fff;border-color:var(--pc,var(--ink))}
.snores{font-size:12px;letter-spacing:.1em;text-transform:uppercase;opacity:.6;padding:14px 2px}
.act.sm{padding:1px 2px 7px}
.act.sm .nm{font-size:10px}
.act.sm .tm{display:none}
.act.note{border-style:dashed;color:var(--faded);border-color:var(--faded);pointer-events:none;padding-bottom:2px}
.act .dots{position:absolute;bottom:2px;left:0;right:0;display:flex;gap:3px;justify-content:center}
.act .dot{width:7px;height:7px;border-radius:50%;border:1px solid var(--paper);box-shadow:0 0 0 .5px var(--ink)}
/* ---------- PLAN ---------- */
#plan{height:100%;overflow-y:auto;padding:14px 12px 90px}
.dayTitle{font-weight:800;font-size:24px;margin:2px 0 12px;text-transform:uppercase;letter-spacing:-.01em}
.filterRow{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.fchip{border:1.5px solid var(--ink);padding:3px 10px;font-size:12px;text-transform:uppercase;letter-spacing:.08em}
.fchip.on{background:var(--ink);color:var(--paper)}
.entry{display:flex;gap:10px;border:1.5px solid var(--ink);margin-bottom:8px;background:var(--paper)}
.entry .when{flex:0 0 64px;border-right:1.5px solid var(--ink);padding:8px 6px;text-align:center;display:flex;flex-direction:column;justify-content:center}
.entry .when .s{font-size:15px;font-weight:700}
.entry .when .e{font-size:10px;opacity:.7}
.entry .what{flex:1;padding:8px 10px 8px 2px;min-width:0}
.entry .what .a{font-size:15px;font-weight:600;text-transform:uppercase;line-height:1.1}
.entry .what .st{font-size:11px;letter-spacing:.1em;text-transform:uppercase;opacity:.75;margin-top:2px}
.entry .who{display:flex;gap:4px;margin-top:5px;flex-wrap:wrap}
.wchip{display:flex;align-items:center;gap:4px;font-size:10px;text-transform:uppercase;letter-spacing:.06em;border:1px solid var(--ink);padding:1px 6px}
.wchip .pd{width:7px;height:7px;border-radius:50%}
.entry.clash{border-width:2.5px;border-color:var(--red);box-shadow:3px 3px 0 var(--red)}
.tag{display:inline-block;font-size:9.5px;letter-spacing:.14em;padding:1px 6px;margin-left:6px;vertical-align:2px}
.tag.cl{background:var(--red);color:var(--paper)}
.tag.all{background:var(--green);color:var(--paper)}
.gapline{font-size:11px;letter-spacing:.12em;text-transform:uppercase;opacity:.6;margin:10px 2px}
.empty{border:1.5px dashed var(--faded);color:var(--faded);padding:26px 14px;text-align:center;font-size:14px;text-transform:uppercase;letter-spacing:.1em;line-height:1.6}
/* ---------- SHEET / BANNER ---------- */
#sheet{position:fixed;inset:0;z-index:50;display:none;align-items:flex-end;background:rgba(0,0,0,.4)}
#sheet.open{display:flex}
.sheetIn{background:var(--paper);border-top:2.5px solid var(--ink);width:100%;padding:16px 16px calc(18px + env(safe-area-inset-bottom));max-height:78dvh;overflow-y:auto}
.sheetIn h2{font-weight:800;font-size:18px;margin-bottom:12px;text-transform:uppercase}
.srow{display:flex;gap:8px;margin-bottom:10px;align-items:center;flex-wrap:wrap}
.sbtn{border:1.5px solid var(--ink);padding:8px 14px;font-size:13px;text-transform:uppercase;letter-spacing:.1em;background:var(--paper)}
.sbtn.solid{background:var(--ink);color:var(--paper)}
.sbtn.danger{border-color:var(--red);color:var(--red)}
.sin{border:1.5px solid var(--ink);background:var(--paper);padding:8px 10px;font:inherit;font-size:16px;color:var(--ink);flex:1;min-width:120px;text-transform:uppercase}
.sin:focus{outline:2px solid var(--ink)}
.shint{font-size:12px;line-height:1.5;opacity:.8;margin:6px 0 14px}
#banner{position:fixed;left:10px;right:10px;bottom:calc(12px + env(safe-area-inset-bottom));z-index:60;display:none}
#banner.show{display:block}
.bIn{background:var(--ink);color:var(--paper);padding:12px 14px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;box-shadow:4px 4px 0 rgba(0,0,0,.3)}
.bIn .msg{flex:1;font-size:13px;text-transform:uppercase;letter-spacing:.06em;min-width:150px}
.bIn button{border:1.5px solid var(--paper);padding:5px 12px;font-size:12px;text-transform:uppercase;letter-spacing:.1em}
.bIn button.pri{background:var(--paper);color:var(--ink)}
@media(min-width:700px){:root{--colw:150px}.masthead h1{font-size:24px}}
@media(max-width:480px){
  :root{--colw:112px;--gutter:38px;--hour:44px}
  .masthead{padding:8px 10px 2px}
  .masthead h1{font-size:16px}
  .masthead .sub{font-size:10px;letter-spacing:.2em}
  .masthead .share{font-size:11px;padding:2px 8px}
  .people{padding:5px 10px 7px}
  .pchip{font-size:12px;padding:3px 8px}
  .dtab{font-size:12px;padding:7px 0 6px;letter-spacing:.08em}
  .vtab{width:52px;font-size:10px}
  .shead{font-size:9.5px;letter-spacing:.05em;padding:5px 2px;min-height:30px}
  .act .nm{font-size:11px}
  .dayTitle{font-size:20px}
}
</style>
</head>

<div id="sheet"></div>

const STAGE_ORDER = ['DERREN SMART STAGE','PINTERS','THE WAREHOUSE','THE QUARRY','THE PAVILION','EARTHLING','OUTBURST','TERMINUS','STALLIONS','THE OLD GRAMOPHONE','GIANT STEPS','SCULPTURE GARDEN','THE ORCHARD','THE ARMADILLO'];
const TERMINUS_DAYS = ['fri','sat','sun'];
const COLORS = ['#1976D2','#2E7D32','#D84315','#7B1FA2','#C2185B','#00796B','#303F9F','#D32F2F','#6D4C41','#455A64'];
const HOUR = 48, DAY_MIN = 23*60;

// act id = day~stage~start
function aid(day,a){ return day+'~'+STAGE_ORDER.indexOf(a.stage)+'~'+a.start; }
function fmt(m){ const h=(9+Math.floor(m/60))%24; return String(h).padStart(2,'0')+':'+String(m%60).padStart(2,'0'); }
const ACTS = {};   // id -> {day, stage, artist, start, end}
DAYS.forEach(d => DATA[d].forEach(a => { ACTS[aid(d,a)] = {day:d, ...a}; }));

// ---------- state ----------
const KEY='htn26-v1';
let S;
try { S = JSON.parse(localStorage.getItem(KEY)) || null; } catch(e){ S = null; }
if (!S || !S.people) {
  S = { people:[], picks:{}, active:null, day:'thu', view:'grid', planDay:'all' };
}
if(!S.planDay) S.planDay='all';
if(S.active && !S.people.find(p=>p.id===S.active)) S.active=null;
if(!S.active && S.people.length) S.active=S.people[0].id;
S.people.forEach((p,i)=>{ if(!COLORS.includes(p.color)) p.color=COLORS[i%COLORS.length]; });
function save(){ try{ localStorage.setItem(KEY, JSON.stringify(S)); }catch(e){} }
function person(id){ return S.people.find(p=>p.id===id); }
function picksOf(id){ return (S.picks[id]||[]).filter(x=>ACTS[x]); }

// ---------- header ----------
function renderPeople(){
  const row = document.getElementById('peopleRow');
  row.innerHTML='';
  S.people.forEach(p=>{
    const b=document.createElement('button');
    b.className='pchip'+(p.id===S.active?' on':'');
    b.style.setProperty('--pc',p.color);
    b.textContent=p.name;
    b.onclick=()=>{ S.active=p.id; save(); renderAll(); openPersonView(p); };
    row.appendChild(b);
  });
  const add=document.createElement('button');
  add.className='pchip add'; add.textContent='+ join party';
  add.onclick=()=>openPersonSheet(null);
  row.appendChild(add);
}
function renderTabs(){
  const dt=document.getElementById('dayTabs'); dt.innerHTML='';
  DAYS.forEach(d=>{
    const n = picksOf(S.active).filter(x=>ACTS[x].day===d).length;
    const b=document.createElement('button');
    const on = S.view==='plan' ? (S.planDay===d) : (S.day===d);
    b.className='dtab'+(on?' on':'');
    b.innerHTML=DAYNAMES[d].slice(0,3)+(n?`<span class="cnt">${n}</span>`:'');
    b.onclick=()=>{ S.day=d; if(S.view==='plan') S.planDay=(S.planDay===d?'all':d); save(); renderAll(); };
    dt.appendChild(b);
  });
  document.getElementById('vGrid').className='vtab'+(S.view==='grid'?' on':'');
  document.getElementById('vPlan').className='vtab'+(S.view==='plan'?' on':'');
}
document.getElementById('vGrid').onclick=()=>{S.view='grid';save();renderAll();};
document.getElementById('vPlan').onclick=()=>{S.view='plan';save();renderAll();};

// ---------- grid ----------
function renderGrid(){
  const prev=document.getElementById('gridWrap');
  const keep=prev?{t:prev.scrollTop,l:prev.scrollLeft,d:prev.dataset.day}:null;
  const day=S.day;
  const acts=DATA[day];
  const stages=STAGE_ORDER.filter(s=>acts.some(a=>a.stage===s) || (s==='TERMINUS'&&TERMINUS_DAYS.includes(day)));
  const wrap=document.createElement('div'); wrap.id='gridWrap'; wrap.dataset.day=day;
  const g=document.createElement('div'); g.className='grid';
  // header
  const hr=document.createElement('div'); hr.className='hdrRow';
  hr.innerHTML='<div class="corner"></div>'+stages.map(s=>`<div class="shead">${esc(titleStage(s))}</div>`).join('')+'<div class="shead fill"></div>';
  g.appendChild(hr);
  // body
  const br=document.createElement('div'); br.className='bodyRow';
  const gut=document.createElement('div'); gut.className='gutter gut';
  gut.style.height=(DAY_MIN/60*HOUR)+'px';
  for(let h=0;h<=23;h++){
    const lab=document.createElement('div'); lab.className='hlabel';
    lab.style.top=(h*HOUR)+'px'; lab.textContent=fmt(h*60);
    gut.appendChild(lab);
  }
  br.appendChild(gut);
  stages.forEach(s=>{
    const col=document.createElement('div'); col.className='col';
    col.style.height=(DAY_MIN/60*HOUR)+'px';
    if(s==='TERMINUS'){
      const n=document.createElement('div'); n.className='act note';
      n.style.top='6px'; n.style.height=(DAY_MIN/60*HOUR-12)+'px';
      n.innerHTML='<div class="nm">Open 24 hours<br><br>Secret line-up —<br>artists not announced</div>';
      col.appendChild(n);
    }
    acts.filter(a=>a.stage===s).forEach((a,ai)=>{
      const id=aid(day,a);
      const el=document.createElement('button');
      const durPx=(a.end-a.start)/60*HOUR;
      const who=S.people.filter(p=>picksOf(p.id).includes(id));
      el.className='act'+(durPx<34?' sm':'')+(ai%2?' g2':'')+(who.length?' picked':'');
      el.dataset.aid=id;
      if(who.length===1){ el.style.background=who[0].color; }
      else if(who.length>1){
        const n=who.length;
        el.style.background=`linear-gradient(rgba(0,0,0,.22),rgba(0,0,0,.22)),linear-gradient(90deg,${who.map((p,i)=>`${p.color} ${i*100/n}%,${p.color} ${(i+1)*100/n}%`).join(',')})`;
      }
      el.style.top=(a.start/60*HOUR)+'px';
      el.style.height=Math.max(durPx-2,16)+'px';
      const showTm=durPx>=56;
      const lines=Math.max(1,Math.floor((durPx-(showTm?26:14))/13));
      el.style.setProperty('--cl',lines);
      el.title=`${a.artist} — ${fmt(a.start)}–${fmt(a.end)} — ${titleStage(a.stage)}`;
      el.innerHTML=`<div class="nm">${esc(a.artist)}</div>`+(showTm?`<div class="tm">${fmt(a.start)}–${fmt(a.end)}</div>`:'');
      el.onclick=()=>openActSheet(id);
      col.appendChild(el);
    });
    br.appendChild(col);
  });
  const filler=document.createElement('div');
  filler.className='col fill';
  filler.style.height=(DAY_MIN/60*HOUR)+'px';
  br.appendChild(filler);
  g.appendChild(br);
  wrap.appendChild(g);
  const main=document.getElementById('main');
  main.innerHTML=''; main.appendChild(wrap);
  if(keep&&keep.d===day){
    wrap.scrollTop=keep.t; wrap.scrollLeft=keep.l;
  }else{
    const first=Math.min(...acts.map(a=>a.start));
    wrap.scrollTop=Math.max(0,(isFinite(first)?first:0)/60*HOUR-20);
  }
}
function titleStage(s){ return s.replace('DERREN SMART STAGE','DERREN SMART'); }
function togglePick(id){
  if(!S.active){ openPersonSheet(null); return; }
  const arr=S.picks[S.active]||(S.picks[S.active]=[]);
  const i=arr.indexOf(id);
  if(i>=0) arr.splice(i,1); else arr.push(id);
  save(); renderAll();
}
function openActSheet(id){
  const a=ACTS[id];
  const sheet=document.getElementById('sheet');
  sheet.className='open';
  let body;
  if(!S.people.length){
    body=`<div class="shint">Add a person first, then tap sets to mark who's going.</div>
      <div class="srow"><button class="sbtn solid" id="asAdd">Add a person</button></div>`;
  }else{
    body=S.people.map(p=>{
      const going=picksOf(p.id).includes(id);
      return `<button class="pbig${going?' going':''}" data-p="${p.id}" style="--pc:${p.color}">
        <span class="pd" style="background:${going?'#fff':p.color}"></span>${esc(p.name)}
        <span class="st2">${going?'Going ✓':'Not going'}</span></button>`;
    }).join('');
  }
  sheet.innerHTML=`<div class="sheetIn">
    <h2>${esc(a.artist)}</h2>
    <div class="shint">${DAYNAMES[a.day]} · ${fmt(a.start)}–${fmt(a.end)} · ${esc(titleStage(a.stage))}</div>
    ${body}
    <div class="srow" style="margin-top:8px"><button class="sbtn" id="asClose">Done</button></div>
  </div>`;
  sheet.onclick=e=>{ if(e.target===sheet) closeSheet(); };
  document.getElementById('asClose').onclick=closeSheet;
  const addB=document.getElementById('asAdd');
  if(addB) addB.onclick=()=>openPersonSheet(null);
  sheet.querySelectorAll('.pbig').forEach(b=>{
    b.onclick=()=>{
      const pid=b.dataset.p;
      const arr=S.picks[pid]||(S.picks[pid]=[]);
      const i=arr.indexOf(id);
      if(i>=0) arr.splice(i,1); else arr.push(id);
      save(); renderAll(); openActSheet(id);
    };
  });
}

// ---------- plan ----------
let planFilter='all';
function renderPlan(){
  const main=document.getElementById('main');
  const el=document.createElement('div'); el.id='plan';
  // person filter
  const fr=document.createElement('div'); fr.className='filterRow';
  const mk=(key,label,color)=>{
    const b=document.createElement('button');
    b.className='fchip'+(planFilter===key?' on':'');
    b.innerHTML=(color?`<span class="pd" style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${color};margin-right:5px"></span>`:'')+esc(label);
    b.onclick=()=>{planFilter=key;renderAll();};
    fr.appendChild(b);
  };
  mk('all','Everyone');
  S.people.forEach(p=>mk(p.id,p.name,p.color));
  el.appendChild(fr);
  // day filter
  const dr=document.createElement('div'); dr.className='filterRow';
  const mkd=(key,label)=>{
    const b=document.createElement('button');
    b.className='fchip'+(S.planDay===key?' on':'');
    b.textContent=label;
    b.onclick=()=>{ S.planDay=key; if(key!=='all') S.day=key; save(); renderAll(); };
    dr.appendChild(b);
  };
  mkd('all','All days');
  DAYS.forEach(d=>mkd(d,DAYNAMES[d].slice(0,3)));
  el.appendChild(dr);

  const showDays = S.planDay==='all' ? DAYS : [S.planDay];
  const inFilter = planFilter==='all' ? S.people.map(p=>p.id) : [planFilter];
  let any=false;
  showDays.forEach(day=>{
    const ids=new Set();
    inFilter.forEach(pid=>picksOf(pid).forEach(x=>{ if(ACTS[x].day===day) ids.add(x); }));
    const list=[...ids].map(x=>ACTS[x]).sort((a,b)=>a.start-b.start||a.end-b.end);
    if(!list.length) return;
    any=true;
    const h=document.createElement('div'); h.className='dayTitle'; h.textContent=DAYNAMES[day];
    el.appendChild(h);
    // per-person clashes for this day
    const clashes=new Set();
    S.people.forEach(p=>{
      const mine=picksOf(p.id).filter(x=>ACTS[x].day===day).map(x=>ACTS[x]);
      for(let i=0;i<mine.length;i++)for(let j=i+1;j<mine.length;j++){
        const a=mine[i],b=mine[j];
        if(a.start<b.end&&b.start<a.end){ clashes.add(aid(day,a)); clashes.add(aid(day,b)); }
      }
    });
    list.forEach(a=>{
      const id=aid(day,a);
      const who=S.people.filter(p=>picksOf(p.id).includes(id));
      const everyone=S.people.length>1&&who.length===S.people.length;
      const clash=clashes.has(id)&&(planFilter==='all'||who.some(p=>p.id===planFilter));
      const e=document.createElement('div');
      e.className='entry'+(clash?' clash':'');
      e.innerHTML=`
        <div class="when"><div class="s">${fmt(a.start)}</div><div class="e">till ${fmt(a.end)}</div></div>
        <div class="what">
          <div class="a">${esc(a.artist)}${clash?'<span class="tag cl">clash</span>':''}${everyone?'<span class="tag all">everyone</span>':''}</div>
          <div class="st">${esc(titleStage(a.stage))}</div>
          <div class="who">${who.map(p=>`<span class="wchip"><span class="pd" style="background:${p.color}"></span>${esc(p.name)}</span>`).join('')}</div>
        </div>`;
      el.appendChild(e);
    });
  });
  if(!any){
    el.innerHTML+=`<div class="empty">No picks yet.<br>Flip to Grid or hit Search and tap the sets you want.</div>`;
  }
  main.innerHTML=''; main.appendChild(el);
}

// ---------- person sheet ----------
function openPersonSheet(p){
  const sheet=document.getElementById('sheet');
  sheet.className='open'; sheet.innerHTML='';
  const inWrap=document.createElement('div'); inWrap.className='sheetIn';
  inWrap.innerHTML=`<h2>${p?'Edit '+esc(p.name):'Join the party'}</h2>`+(p?'':'<div class="shint">Add yourself — and anyone whose picks you\'re wrangling. Everyone gets a colour.</div>');
  const row=document.createElement('div'); row.className='srow';
  const input=document.createElement('input');
  input.className='sin'; input.placeholder='Your name'; input.maxLength=14;
  if(p) input.value=p.name;
  row.appendChild(input);
  const ok=document.createElement('button'); ok.className='sbtn solid'; ok.textContent=p?'Save':'Join';
  ok.onclick=()=>{
    const nm=input.value.trim().toUpperCase();
    if(!nm) return;
    if(p){ p.name=nm; }
    else{
      const id='p'+Date.now();
      S.people.push({id,name:nm,color:COLORS[S.people.length%COLORS.length]});
      S.picks[id]=[]; S.active=id;
    }
    save(); closeSheet(); renderAll();
  };
  row.appendChild(ok);
  inWrap.appendChild(row);
  if(p){
    const del=document.createElement('button'); del.className='sbtn danger';
    del.textContent='Remove '+p.name;
    del.onclick=()=>{
      S.people=S.people.filter(x=>x.id!==p.id); delete S.picks[p.id];
      if(S.active===p.id) S.active=S.people.length?S.people[0].id:null;
      save(); closeSheet(); renderAll();
    };
    const r2=document.createElement('div'); r2.className='srow'; r2.appendChild(del);
    inWrap.appendChild(r2);
  }
  const cancel=document.createElement('button'); cancel.className='sbtn'; cancel.textContent='Cancel';
  cancel.onclick=closeSheet;
  const r3=document.createElement('div'); r3.className='srow'; r3.appendChild(cancel);
  inWrap.appendChild(r3);
  sheet.appendChild(inWrap);
  sheet.onclick=e=>{ if(e.target===sheet) closeSheet(); };
  input.focus();
}
function closeSheet(){ const s=document.getElementById('sheet'); s.className=''; s.innerHTML=''; }

// ---------- person schedule view ----------
function openPersonView(p){
  const sheet=document.getElementById('sheet');
  sheet.className='open';
  const picks=picksOf(p.id);
  let body='';
  DAYS.forEach(day=>{
    const list=picks.map(x=>ACTS[x]).filter(a=>a.day===day).sort((a,b)=>a.start-b.start);
    if(!list.length) return;
    body+=`<div class="pvday">${DAYNAMES[day]}</div>`;
    list.forEach(a=>{
      body+=`<div class="pvrow"><span class="t">${fmt(a.start)}–${fmt(a.end)}</span>
        <span class="n">${esc(a.artist)}</span><span class="s">${esc(titleStage(a.stage))}</span></div>`;
    });
  });
  if(!body) body='<div class="shint">No picks yet — tap sets in the grid or use Search.</div>';
  sheet.innerHTML=`<div class="sheetIn">
    <h2 style="color:${p.color}">${esc(p.name)}</h2>
    ${body}
    <div class="srow" style="margin-top:10px">
      <button class="sbtn" id="pvEdit">Edit</button>
      <button class="sbtn" id="pvClose">Close</button>
    </div>
  </div>`;
  sheet.onclick=e=>{ if(e.target===sheet) closeSheet(); };
  document.getElementById('pvClose').onclick=closeSheet;
  document.getElementById('pvEdit').onclick=()=>openPersonSheet(p);
}

// ---------- share ----------
function b64e(s){ return btoa(unescape(encodeURIComponent(s))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,''); }
function b64d(s){ return decodeURIComponent(escape(atob(s.replace(/-/g,'+').replace(/_/g,'/')))); }
document.getElementById('shareBtn').onclick=()=>{
  const sheet=document.getElementById('sheet');
  sheet.className='open';
  if(!S.people.length){
    sheet.innerHTML=`<div class="sheetIn"><h2>Share picks</h2>
      <div class="shint">Nothing to share yet — add a person and pick some sets first.</div>
      <div class="srow"><button class="sbtn" id="shClose">Close</button></div></div>`;
    sheet.onclick=e=>{ if(e.target===sheet) closeSheet(); };
    document.getElementById('shClose').onclick=closeSheet;
    return;
  }
  const me=person(S.active);
  sheet.innerHTML=`<div class="sheetIn">
    <h2>Share picks</h2>
    <div class="shint">Send a link. When someone opens it, your picks appear on their planner (and theirs can come back to you the same way). Everything else works offline — no accounts, no server.</div>
    <div class="srow"><button class="sbtn solid" id="shMine">Copy link — ${esc(me.name)}'s picks (${picksOf(S.active).length})</button></div>
    <div class="srow"><button class="sbtn" id="shAll">Copy link — whole group</button></div>
    <div class="srow"><button class="sbtn" id="shClose">Close</button></div>
  </div>`;
  sheet.onclick=e=>{ if(e.target===sheet) closeSheet(); };
  const mkurl=payload=>location.origin+location.pathname+'#i='+b64e(JSON.stringify(payload));
  document.getElementById('shMine').onclick=async ev=>{
    const url=mkurl({v:1,people:[{n:me.name,p:picksOf(S.active)}]});
    await copy(url, ev.target);
  };
  document.getElementById('shAll').onclick=async ev=>{
    const url=mkurl({v:1,people:S.people.map(p=>({n:p.name,p:picksOf(p.id)}))});
    await copy(url, ev.target);
  };
  document.getElementById('shClose').onclick=closeSheet;
};
async function copy(text,btn){
  try{ await navigator.clipboard.writeText(text); }
  catch(e){
    const ta=document.createElement('textarea'); ta.value=text; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy'); ta.remove();
  }
  const old=btn.textContent; btn.textContent='Copied ✓';
  setTimeout(()=>{ btn.textContent=old; },1500);
}

// ---------- search ----------
document.getElementById('searchBtn').onclick=openSearch;
function openSearch(){
  const sheet=document.getElementById('sheet');
  sheet.className='open';
  sheet.innerHTML=`<div class="sheetIn">
    <h2>Search</h2>
    <div class="srow"><input class="sin" id="sq" placeholder="Artist, stage or day" autocomplete="off"></div>
    <div id="sres"></div>
    <div class="srow" style="margin-top:8px"><button class="sbtn" id="sqClose">Close</button></div>
  </div>`;
  sheet.onclick=e=>{ if(e.target===sheet) closeSheet(); };
  document.getElementById('sqClose').onclick=closeSheet;
  const input=document.getElementById('sq');
  input.oninput=()=>renderResults(input.value);
  input.focus();
}
function renderResults(q){
  const box=document.getElementById('sres');
  if(!box) return;
  q=(q||'').trim().toLowerCase();
  box.innerHTML='';
  if(q.length<2){ return; }
  const hits=Object.entries(ACTS).filter(([id,a])=>
      a.artist.toLowerCase().includes(q)||a.stage.toLowerCase().includes(q)||DAYNAMES[a.day].toLowerCase().includes(q))
    .sort((x,y)=>DAYS.indexOf(x[1].day)-DAYS.indexOf(y[1].day)||x[1].start-y[1].start)
    .slice(0,60);
  if(!hits.length){ box.innerHTML='<div class="snores">Nothing matches. Try part of a name.</div>'; return; }
  hits.forEach(([id,a])=>{
    const row=document.createElement('div');
    const picked=picksOf(S.active).includes(id);
    row.className='sr'+(picked?' picked':'');
    const ap=person(S.active);
    if(picked&&ap) row.style.setProperty('--pc',ap.color);
    row.innerHTML=`
      <div class="d">${DAYNAMES[a.day].slice(0,3)}<small>${fmt(a.start)}–${fmt(a.end)}</small></div>
      <div class="a">${esc(a.artist)}<small>${esc(titleStage(a.stage))}</small></div>
      <button class="go">Go</button>`;
    row.onclick=()=>{ togglePick(id); renderResults(q); };
    row.querySelector('.go').onclick=e=>{ e.stopPropagation(); jumpTo(id); };
    box.appendChild(row);
  });
}
function jumpTo(id){
  closeSheet();
  const a=ACTS[id];
  S.day=a.day; S.view='grid'; save(); renderAll();
  requestAnimationFrame(()=>{
    const wrap=document.getElementById('gridWrap');
    const el=wrap&&wrap.querySelector(`[data-aid="${CSS.escape(id)}"]`);
    if(!el) return;
    wrap.scrollTop=Math.max(0,el.offsetTop-90);
    wrap.scrollLeft=Math.max(0,el.parentElement.offsetLeft-60);
    el.classList.add('flash');
    setTimeout(()=>el.classList.remove('flash'),1900);
  });
}

// import from hash
function checkImport(){
  const m=location.hash.match(/#i=([A-Za-z0-9_\-]+)/);
  if(!m) return;
  let payload=null;
  try{ payload=JSON.parse(b64d(m[1])); }catch(e){}
  history.replaceState(null,'',location.pathname+location.search);
  if(!payload||!payload.people||!payload.people.length) return;
  const banner=document.getElementById('banner');
  const names=payload.people.map(p=>p.n).join(', ');
  const total=payload.people.reduce((s,p)=>s+(p.p||[]).length,0);
  banner.className='show';
  banner.innerHTML=`<div class="bIn">
    <span class="msg">Import picks from ${esc(names)} (${total} sets)?</span>
    <button class="pri" id="impYes">Import</button><button id="impNo">Ignore</button>
  </div>`;
  document.getElementById('impYes').onclick=()=>{
    payload.people.forEach(inc=>{
      const nm=String(inc.n||'FRIEND').toUpperCase().slice(0,14);
      const valid=(inc.p||[]).filter(x=>ACTS[x]);
      let ex=S.people.find(p=>p.name===nm);
      if(!ex){
        ex={id:'p'+Date.now()+Math.floor(Math.random()*999),name:nm,color:COLORS[S.people.length%COLORS.length]};
        S.people.push(ex);
      }
      S.picks[ex.id]=valid;
    });
    save(); banner.className=''; banner.innerHTML=''; renderAll();
  };
  document.getElementById('impNo').onclick=()=>{ banner.className=''; banner.innerHTML=''; };
}

// ---------- misc ----------
function esc(s){ return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function renderAll(){
  renderPeople(); renderTabs();
  document.documentElement.style.setProperty('--headh',document.getElementById('hdr').offsetHeight+'px');
  document.getElementById('main').style.top=document.getElementById('hdr').offsetHeight+'px';
  if(S.view==='grid') renderGrid(); else renderPlan();
}
window.addEventListener('resize',()=>{ document.getElementById('main').style.top=document.getElementById('hdr').offsetHeight+'px'; });
renderAll();
checkImport();
if(!S.people.length && !document.getElementById('banner').classList.contains('show')) openPersonSheet(null);
